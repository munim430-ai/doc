<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folio Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000;
    --line: rgba(255, 255, 255, 0.18);
    --line-strong: rgba(255, 60, 60, 0.6);
    --white: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--white);
    font-family: 'Geist Mono', monospace;
  }
  body { position: relative; display: grid; place-items: center; }
  .window-dragbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 32px;
    z-index: 9999;
    background: transparent;
    -webkit-app-region: drag;
  }
  .window-controls {
    position: absolute;
    top: 6px;
    right: 10px;
    display: none;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  .window-controls.native { display: flex; }
  .window-btn {
    width: 36px;
    height: 20px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.82);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
  }
  .window-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }
  .window-btn.close:hover {
    background: rgba(255, 60, 60, 0.18);
    border-color: rgba(255, 60, 60, 0.3);
  }
  .background, .scanlines, .vignette, .flash { position: absolute; inset: 0; }
  .background { overflow: hidden; }
  .conic-sweep {
    position: absolute;
    inset: -40%;
    background:
      radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 42%),
      conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.08) 70deg, transparent 130deg, transparent 360deg);
    animation: rotateSweep 22s linear infinite;
    opacity: 0.7;
  }
  .beam {
    position: absolute;
    inset: -30%;
    background: linear-gradient(105deg, transparent 44%, rgba(255,255,255,0.08) 49%, rgba(255,255,255,0.02) 55%, transparent 61%);
    transform: translateX(-120%);
    animation: beamSweep 10s linear infinite;
  }
  #particles {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.65;
  }
  .scanlines {
    pointer-events: none;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.035) 0, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 3px);
    opacity: 0.11;
    mix-blend-mode: screen;
  }
  .vignette {
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 34%, rgba(0,0,0,0.88) 100%);
  }
  .flash {
    pointer-events: none;
    background: #fff;
    opacity: 0;
    transition: opacity 150ms ease;
  }
  .flash.active { opacity: 1; }
  .stage {
    position: relative;
    z-index: 2;
    width: min(92vw, 720px);
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    padding: 32px 24px;
  }
  .logo-wrap {
    position: relative;
    display: grid;
    place-items: center;
    width: min(520px, 100%);
    height: 200px;
  }
  .logo {
    width: min(420px, 76vw);
    height: auto;
    fill: #fff;
    filter: drop-shadow(0 0 16px rgba(255,255,255,0.12));
    animation: logoGlow 4.5s ease-in-out infinite;
  }
  .rings {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
  }
  .ring {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.14);
    opacity: 0;
    animation: pulseRing 4.8s ease-out infinite;
  }
  .ring.r2 { animation-delay: 1.6s; }
  .ring.r3 { animation-delay: 3.2s; }
  .licensed {
    margin-top: 20px;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }
  .password {
    margin-top: 48px;
    width: 220px;
    padding: 10px 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    font: 400 15px 'Geist Mono', monospace;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 200ms ease;
  }
  .password::placeholder { color: rgba(255,255,255,0.42); }
  .password.shake { animation: shake 400ms ease; }
  .password.invalid { border-bottom-color: var(--line-strong); }
  @keyframes rotateSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes beamSweep {
    0%, 72% { transform: translateX(-120%); opacity: 0; }
    76%, 88% { transform: translateX(0%); opacity: 1; }
    100% { transform: translateX(120%); opacity: 0; }
  }
  @keyframes pulseRing {
    0% { transform: scale(0.55); opacity: 0; }
    16% { opacity: 0.28; }
    100% { transform: scale(2.8); opacity: 0; }
  }
  @keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(255,255,255,0.1)); }
    50% { filter: drop-shadow(0 0 24px rgba(255,255,255,0.22)); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(5px); }
  }
</style>
</head>
<body>
  <div class="window-dragbar">
    <div class="window-controls" id="windowControls">
      <button class="window-btn" id="minimizeBtn" type="button">_</button>
      <button class="window-btn" id="maximizeBtn" type="button">[]</button>
      <button class="window-btn close" id="closeBtn" type="button">X</button>
    </div>
  </div>

  <div class="background">
    <canvas id="particles"></canvas>
    <div class="conic-sweep"></div>
    <div class="beam"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="flash" id="flash"></div>
  </div>

  <main class="stage">
    <section class="stack" autocomplete="off">
      <div class="logo-wrap">
        <div class="rings" aria-hidden="true">
          <span class="ring"></span>
          <span class="ring r2"></span>
          <span class="ring r3"></span>
        </div>
        <svg class="logo" viewBox="0 0 370 150" aria-label="Folio logo">
          <rect x="10" y="15" width="20" height="120"></rect>
          <rect x="30" y="15" width="34" height="20"></rect>
          <rect x="10" y="65" width="44" height="20"></rect>
          <path d="M80 15 h76 v120 h-76 Z M104 38 h28 v74 h-28 Z" fill-rule="evenodd"></path>
          <rect x="172" y="15" width="20" height="120"></rect>
          <rect x="172" y="115" width="50" height="20"></rect>
          <rect x="238" y="15" width="20" height="22"></rect>
          <rect x="238" y="50" width="20" height="85"></rect>
          <path d="M274 15 h76 v120 h-76 Z M298 38 h28 v74 h-28 Z" fill-rule="evenodd"></path>
        </svg>
      </div>
      <div class="licensed">Licensed to Fahim</div>
      <input type="password" style="display:none" aria-hidden="true">
      <input id="passwordInput" class="password" type="password" placeholder="· · · · · · · ·" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
    </section>
  </main>
<script>
  const input = document.getElementById('passwordInput');
  const flash = document.getElementById('flash');
  const windowControls = document.getElementById('windowControls');
  const hasNativeWindow = Boolean(window.folioWindow);

  if (hasNativeWindow) {
    windowControls.classList.add('native');
    document.getElementById('closeBtn').addEventListener('click', () => window.folioWindow?.close?.());
    document.getElementById('minimizeBtn').addEventListener('click', () => window.folioWindow?.minimize?.());
    document.getElementById('maximizeBtn').addEventListener('click', () => window.folioWindow?.maximize?.());
  }

  function baseUrl() {
    if (window.location.protocol === 'file:' && window.FOLIO_PORT) {
      return `http://127.0.0.1:${window.FOLIO_PORT}`;
    }
    return window.location.origin;
  }

  function resetInvalidState() {
    input.classList.remove('shake');
    input.classList.remove('invalid');
  }

  function rejectPassword() {
    input.classList.remove('shake');
    void input.offsetWidth;
    input.classList.add('shake');
    input.classList.add('invalid');
    input.value = '';
    input.focus();
    setTimeout(() => input.classList.remove('invalid'), 800);
  }

  async function acceptPassword() {
    const response = await fetch(`${baseUrl()}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ password: input.value }),
    });

    if (!response.ok) {
      rejectPassword();
      return;
    }

    flash.classList.add('active');
    setTimeout(() => {
      window.location.href = `${baseUrl()}/app`;
    }, 150);
  }

  input.addEventListener('keydown', async (event) => {
    if (event.key !== 'Enter') {
      return;
    }

    event.preventDefault();
    try {
      await acceptPassword();
    } catch {
      rejectPassword();
    }
  });

  input.addEventListener('input', resetInvalidState);

  const canvas = document.getElementById('particles');
  const context = canvas.getContext('2d');
  const particleCount = 90;
  const particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function makeParticle() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.7 + 0.4,
      speed: Math.random() * 0.28 + 0.08,
      alpha: Math.random() * 0.35 + 0.08,
    };
  }

  function seedParticles() {
    particles.length = 0;
    for (let i = 0; i < particleCount; i += 1) {
      particles.push(makeParticle());
    }
  }

  function drawParticles() {
    context.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((particle) => {
      particle.y -= particle.speed;
      if (particle.y < -10) {
        particle.x = Math.random() * canvas.width;
        particle.y = canvas.height + 10;
      }
      context.beginPath();
      context.fillStyle = `rgba(255, 255, 255, ${particle.alpha})`;
      context.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
      context.fill();
    });
    requestAnimationFrame(drawParticles);
  }

  resizeCanvas();
  seedParticles();
  drawParticles();
  window.addEventListener('resize', () => {
    resizeCanvas();
    seedParticles();
  });
</script>
</body>
</html>
